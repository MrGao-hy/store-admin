# 服务端口
server:
  port: 8080

# 数据库MySQL配置
spring:
  # 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/store?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root    # 替换成你的mysql账号
    password: gxh151  # 替换成你的mysql密码
  # Redis配置
  redis:
    host: 127.0.0.1
    port: 6379
    password: gxh151 # redis无密码就删掉这一行
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.gxh.admin.system.entity
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印sql日志

knife4j:
  enable: true

logging:
  level:
    com.gxh.admin: debug